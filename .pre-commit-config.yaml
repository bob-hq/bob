repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.20
      hooks:
          - id: ruff-check
          - id: ruff-format
    - repo: local
      hooks:
          - id: ty-check
            name: ty check
            entry: uv run ty check .
            language: python
            types_or: [python, pyi]
            pass_filenames: false
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v2.1.0
      hooks:
          - id: mypy
            args: [--strict, --ignore-missing-imports]
            additional_dependencies: [click, rich-click, ninja, pytest]
